# Azure DevOps Pipeline for GitHub Sync
# This pipeline automatically pushes code from Azure DevOps to GitHub
# Place this file as: azure-pipelines.yml in your repository root

trigger:
- main
- master

pool:
  vmImage: 'ubuntu-latest'

variables:
  GITHUB_REPO: 'gowthamkish/kgstechway'
  
steps:
- checkout: self
  persistCredentials: true
  clean: true

- script: |
    echo "Setting up Git configuration..."
    git config --global user.email "pipeline@kgstechway.com"
    git config --global user.name "Azure DevOps Pipeline"
    git config --global init.defaultBranch main
    
    echo "Verifying GitHub token..."
    if [ -z "$(GITHUB_TOKEN)" ]; then
      echo "ERROR: GITHUB_TOKEN is not set"
      exit 1
    else
      echo "✅ GitHub token is configured"
    fi
    
    echo "Setting up GitHub remote..."
    # Remove existing GitHub remote if it exists
    git remote remove github 2>/dev/null || echo "No existing GitHub remote found"
    
    # Add GitHub as remote with token authentication
    git remote add github https://$(GITHUB_TOKEN)@github.com/$(GITHUB_REPO).git
    
    echo "Verifying remote setup..."
    git remote -v
    
    echo "Checking current branch..."
    CURRENT_BRANCH=$(git branch --show-current)
    echo "Current branch: $CURRENT_BRANCH"
    
    echo "Fetching from GitHub..."
    git fetch github --prune || echo "Repository might be empty or first push, continuing..."
    
    echo "Pushing to GitHub..."
    git push github HEAD:main --force-with-lease || git push github HEAD:main --force
    
    echo "✅ Successfully synced to GitHub!"
    echo "🔗 Repository URL: https://github.com/$(GITHUB_REPO)"
    
  displayName: 'Sync to GitHub'
  env:
    GITHUB_TOKEN: $(GITHUB_TOKEN)