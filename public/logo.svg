<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="KGSTechway Services">
  <title>KGSTechway Services — Pathway Symbol</title>
  <defs>
    <linearGradient id="kgt-arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <filter id="kgt-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark circular background -->
  <circle cx="32" cy="32" r="32" fill="#0D0D0D"/>

  <!-- Origin anchor dots -->
  <circle cx="10" cy="16" r="4.5" fill="#E74C3C"/>
  <circle cx="10" cy="32" r="4.5" fill="#E67E22"/>
  <circle cx="10" cy="48" r="4.5" fill="#F1C40F"/>

  <!-- Converging pathway curves -->
  <path d="M 14.5,16 C 27,16 36,26 42,26"
        stroke="#E74C3C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 14.5,32 C 24,30 34,34 42,32"
        stroke="#E67E22" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 14.5,48 C 27,48 36,38 42,38"
        stroke="#F1C40F" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Convergence arrow -->
  <polygon points="42,25 54,32 42,39"
           fill="url(#kgt-arrow)" filter="url(#kgt-glow)"/>
</svg>
