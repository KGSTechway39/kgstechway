<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 78" width="430" height="78" role="img" aria-label="KGSTechway Services">
  <title>KGSTechway Services — The Intelligent Pathway to Business Success</title>
  <!--
    KGSTechway Services — Full Logo (Light variant)
    For use on WHITE or LIGHT backgrounds.
    Text color: #1A1A2E (dark navy)
    Google Fonts: https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&display=swap
  -->
  <defs>
    <linearGradient id="arrow-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <filter id="shadow-l" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- ── Icon — scaled 62×62, vertically centred in 78px canvas ── -->
  <!-- translate(0, 8) centres the 62px icon in 78px height (8px top/bottom margin) -->
  <!-- scale(0.969) maps 64-unit viewBox to ~62px display -->
  <g transform="translate(0, 8) scale(0.969)">
    <!-- Origin dots -->
    <circle cx="7" cy="13" r="5" fill="#E74C3C"/>
    <circle cx="7" cy="32" r="5" fill="#E67E22"/>
    <circle cx="7" cy="51" r="5" fill="#F1C40F"/>
    <!-- Pathway curves -->
    <path d="M 12,13 C 27,13 38,24 44,24"
          stroke="#E74C3C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 12,32 C 23,30 35,34 44,32"
          stroke="#E67E22" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 12,51 C 27,51 38,40 44,40"
          stroke="#F1C40F" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Convergence arrow -->
    <polygon points="44,23 57,32 44,41"
             fill="url(#arrow-l)" filter="url(#shadow-l)"/>
  </g>

  <!-- ── Company Name ── -->
  <!-- "KGS" ExtraBold + "techway" Light on the same baseline -->
  <text y="44" font-family="'Plus Jakarta Sans', 'Inter', 'Segoe UI', Arial, sans-serif" font-size="31" fill="#1A1A2E">
    <tspan x="76" font-weight="800" letter-spacing="-0.8">KGS</tspan><tspan dx="2" font-weight="300" letter-spacing="0.2">techway</tspan>
  </text>

  <!-- ── SERVICES label ── -->
  <text x="78" y="57"
        font-family="'Plus Jakarta Sans', 'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="7.5" font-weight="300" fill="#6B7B8D" letter-spacing="4.5">SERVICES</text>

  <!-- ── Tagline ── -->
  <text x="76" y="71"
        font-family="'Plus Jakarta Sans', 'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="9" font-weight="300" fill="#6B7B8D" letter-spacing="1.1">The Intelligent Pathway to Business Success</text>
</svg>
